# .write-blog.cfg — generated by write-blog skill on first run.
# Edit values to match your blog repo. Commit this file (project metadata, not secret).
version: 1
generated_at: YYYY-MM-DD
generated_by: write-blog v5.x

# Where blog posts live
posts:
  dir: content/posts            # glob root for post discovery
  pattern: "**/*.md"            # glob pattern relative to dir
  slug_field: slug              # frontmatter field for URL slug
  title_field: title            # frontmatter field for title
  tags_field: tags              # optional, set null if absent
  excerpt_field: excerpt        # frontmatter field for description

# URL pattern for assembling internal link targets
url:
  base: https://example.com     # site base URL (absolute links if needed)
  post_path: /{slug}            # /{slug}, /blog/{slug}, /posts/{slug}, ...
  internal_link_style: relative # relative | absolute | site-relative
  sitemap: /sitemap.xml         # path; null if site has no sitemap

# Frontmatter shape the writer should emit for new posts
frontmatter:
  required:
    - title
    - slug
    - date
    - excerpt
    - feature_image
  optional:
    - tags
    - last_updated
    - featured

# Image assets
images:
  posts_dir: public/images/posts
  optimizer_cmd: "npm run optimize-images"   # shell cmd; null if none
  watermark_crop_px: 60                      # sips will crop this many px from each edge to remove watermarks

# Dev server (used by Phase 8 visual testing)
dev:
  cmd: "npm run dev"                         # command to start the local preview server
  url_regex: "https?://[a-zA-Z0-9.-]+(:[0-9]+)?"   # regex to extract URL from `cmd` stdout (matches Next.js, Astro, Vite output)
  startup_timeout_seconds: 30                # how long to wait for server to print URL
  fallback_url: "http://localhost:3000"      # only used if url_regex fails to match within timeout

# Visual testing
visual:
  preview_path: "{post_url}"                 # template; {post_url} = url.base + url.post_path applied to slug

# Link policy (per-repo overrides for v5 hard caps)
links:
  external:
    min: 1
    max: 10
    rating_threshold: 6         # 0-10 avg from 3-way grade — T2 keep threshold
    t3_rating_threshold: 8      # higher bar for T3 sources (Medium, dev.to, random blogs)
    # T1 = auto-pass authority (still relevance-checked). Repo extends global defaults.
    whitelist_t1:
      # Defaults (also live in skill code; this list extends them):
      # developer.mozilla.org, docs.python.org, react.dev, nodejs.org,
      # tc39.es, w3.org, whatwg.org, rfc-editor.org, wikipedia.org,
      # iso.org, ieee.org
      []
    # T2 known publications (graded with default rating_threshold):
    known_t2: []                # repo-specific extension of global T2 list
    # T3 = anything not in T1/T2 (Medium, dev.to, LinkedIn, random blogs); uses t3_rating_threshold
  internal:
    min: 1
    max: 5
    rating_threshold: 6

# Preferred expert reviewers for Phase 2.3 + 4.7 expert reviews.
# Skill picks 3 experts whose specialty matches the topic; if this list is set,
# it's preferred over the global table in SKILL.md.
experts:
  preferred:

# .write-blog.cfg — generated by write-blog skill on first run.
# Edit values to match your blog repo. Commit this file (project metadata, not secret).
version: 1
generated_at: YYYY-MM-DD
generated_by: write-blog v5.x

# Where blog posts live
posts:
  dir: content/posts            # glob root for post discovery
  pattern: "**/*.md"            # glob pattern relative to dir
  slug_field: slug              # frontmatter field for URL slug
  title_field: title            # frontmatter field for title
  tags_field: tags              # optional, set null if absent
  excerpt_field: excerpt        # frontmatter field for description

# URL pattern for assembling internal link targets
url:
  base: https://example.com     # site base URL (absolute links if needed)
  post_path: /{slug}            # /{slug}, /blog/{slug}, /posts/{slug}, ...
  internal_link_style: relative # relative | absolute | site-relative
  sitemap: /sitemap.xml         # path; null if site has no sitemap

# Frontmatter shape the writer should emit for new posts
frontmatter:
  required:
    - title
    - slug
    - date
    - excerpt
    - feature_image
  optional:
    - tags
    - last_updated
    - featured

# Image assets
images:
  posts_dir: public/images/posts
  optimizer_cmd: "npm run optimize-images"   # shell cmd; null if none

# Link policy (per-repo overrides for v5 hard caps)
links:
  external:
    min: 1
    max: 10
    rating_threshold: 6         # 0-10 avg from 3-way grade — T2 keep threshold
    t3_rating_threshold: 8      # higher bar for T3 sources (Medium, dev.to, random blogs)
    whitelist_t1: []            # extends global T1 whitelist (auto-pass on authority; still relevance-checked)
  internal:
    min: 1
    max: 5
    rating_threshold: 6

# Iterative humanization loop
humanize:
  target_score: 25              # avg AI-likelihood threshold (0-100, lower = more human; 15-25 is normal for human technical writing — treat as lint signal, not hard gate)
  max_iterations: 5
